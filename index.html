<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prezent dla Ciebie!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 20px rgba(232,160,191,.3)}50%{box-shadow:0 0 40px rgba(232,160,191,.6),0 0 80px rgba(212,165,116,.2)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes pulse-btn{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:.8;transform:scale(1)}}
@keyframes lidOff{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(-250px) rotate(-20deg);opacity:0}}
@keyframes boxBurst{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
@keyframes pin-shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-8px)}30%,60%,90%{transform:translateX(8px)}}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Georgia,"Palatino Linotype",serif;background:linear-gradient(135deg,#1a0a1e 0%,#2d1423 50%,#1a0a1e 100%);color:#fff8f0;display:flex;align-items:center;justify-content:center}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;transition:opacity .6s ease,transform .6s ease;opacity:0;pointer-events:none;transform:scale(.96)}
.screen.active{opacity:1;pointer-events:auto;transform:scale(1)}
canvas#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:100}
.sparkles-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.sparkle-dot{position:absolute;width:3px;height:3px;background:white;border-radius:50%;animation:sparkle var(--dur) var(--delay) infinite ease-in-out}

/* --- PIN screen --- */
.pin-title{font-size:2.2rem;margin-bottom:.3rem;background:linear-gradient(135deg,#f5d0a9,#e8a0bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pin-subtitle{font-size:1rem;color:rgba(255,248,240,.5);margin-bottom:2.5rem;font-family:-apple-system,"Segoe UI",system-ui,sans-serif}
.pin-input{width:220px;padding:.9rem 1.2rem;border-radius:14px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff8f0;font-size:1.3rem;text-align:center;letter-spacing:.3rem;outline:none;transition:border .2s,box-shadow .2s;font-family:-apple-system,"Segoe UI",system-ui,sans-serif}
.pin-input:focus{border-color:#e8a0bf;box-shadow:0 0 20px rgba(232,160,191,.2)}
.pin-input.wrong{animation:pin-shake .5s;border-color:#ff6b6b}
.pin-btn{margin-top:1.5rem;padding:.8rem 2.5rem;border:none;border-radius:12px;background:linear-gradient(135deg,#e8a0bf,#d4789a);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;font-family:-apple-system,"Segoe UI",system-ui,sans-serif}
.pin-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(212,120,154,.4)}
.pin-btn:active{transform:translateY(0)}
.pin-error{color:#ff6b6b;font-size:.85rem;margin-top:.8rem;min-height:1.2rem;font-family:-apple-system,"Segoe UI",system-ui,sans-serif}
.pin-attempts{color:rgba(255,248,240,.3);font-size:.75rem;margin-top:.4rem;font-family:-apple-system,"Segoe UI",system-ui,sans-serif}

/* --- Gift screen --- */
.gift-prompt{font-size:1.1rem;color:rgba(255,248,240,.6);margin-bottom:2.5rem;animation:fadeUp .8s ease .3s both}
.gift-box{position:relative;width:180px;height:200px;cursor:pointer;animation:float 3s ease-in-out infinite;transition:filter .2s}
.gift-box:hover{filter:brightness(1.1);animation:wobble .6s ease-in-out infinite}
.box-body{position:absolute;bottom:0;width:180px;height:150px;background:linear-gradient(145deg,#e8a0bf,#d4789a);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.box-lid{position:absolute;top:10px;left:-8px;width:196px;height:45px;background:linear-gradient(145deg,#f0b8d0,#e098b5);border-radius:10px;box-shadow:0 -2px 15px rgba(0,0,0,.15);z-index:2}
.ribbon-h{position:absolute;top:50%;left:0;width:100%;height:24px;background:linear-gradient(to bottom,#f5d0a9,#d4a574);transform:translateY(-50%);z-index:1}
.ribbon-v{position:absolute;left:50%;top:0;width:24px;height:100%;background:linear-gradient(to right,#f5d0a9,#d4a574);transform:translateX(-50%);z-index:1}
.lid-ribbon{position:absolute;left:50%;top:0;width:24px;height:100%;background:linear-gradient(to right,#f5d0a9,#d4a574);transform:translateX(-50%)}
.bow{position:absolute;top:-18px;left:50%;transform:translateX(-50%);z-index:3}
.bow::before,.bow::after{content:"";position:absolute;width:32px;height:20px;background:#d4a574;border-radius:50% 50% 10% 50%;top:0}
.bow::before{left:-28px;transform:rotate(-30deg)}
.bow::after{right:-28px;transform:rotate(30deg) scaleX(-1)}
.bow-center{position:absolute;top:4px;left:50%;width:14px;height:14px;background:#c49560;border-radius:50%;transform:translateX(-50%);z-index:4}
.gift-box.opening .box-lid{animation:lidOff .8s cubic-bezier(.68,-.55,.265,1.55) forwards}
.gift-box.opening .box-body{animation:boxBurst .6s ease .5s forwards}
.gift-box.opening .bow,.gift-box.opening .bow-center{animation:lidOff .8s cubic-bezier(.68,-.55,.265,1.55) forwards}
.gift-box.opening .ribbon-h,.gift-box.opening .ribbon-v{animation:boxBurst .6s ease .5s forwards}

/* --- Reveal screen --- */
.reveal-amount{font-size:3.5rem;background:linear-gradient(135deg,#f5d0a9,#e8a0bf,#f5d0a9);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:scaleIn .6s ease both;line-height:1.2}
.reveal-store{font-size:1.4rem;color:rgba(255,248,240,.7);margin-top:.4rem;animation:fadeUp .8s ease .2s both;font-style:italic}
.reveal-msg{font-size:1.1rem;color:rgba(255,248,240,.45);margin-top:1.8rem;animation:fadeUp .8s ease .4s both;text-align:center}
.dl-btn{margin-top:2.2rem;padding:1rem 2.5rem;border:none;border-radius:14px;background:linear-gradient(135deg,#d4a574,#c49560);color:#fff;font-size:1.05rem;font-weight:600;cursor:pointer;animation:fadeUp .8s ease .6s both,pulse-btn 2s ease-in-out 1.4s infinite;transition:transform .15s,box-shadow .15s;font-family:-apple-system,"Segoe UI",system-ui,sans-serif}
.dl-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 30px rgba(212,165,116,.4)}
.dl-btn:active{transform:translateY(0) scale(1)}
.heart{font-size:2.5rem;margin-top:1.5rem;animation:fadeUp .8s ease .8s both;}

@media(max-width:480px){
  .pin-title{font-size:1.7rem}
  .reveal-amount{font-size:2.6rem}
  .reveal-store{font-size:1.1rem}
  .gift-box{transform-origin:center;width:140px;height:160px}
  .box-body{width:140px;height:115px}
  .box-lid{width:156px;height:38px;left:-8px}
}
</style>
</head>
<body>
<div class="sparkles-bg" id="sparkles"></div>
<canvas id="confetti-canvas"></canvas>

<div class="screen active" id="screen-pin">
  <div class="pin-title">Masz prezent!</div>
  <p class="pin-subtitle">Wpisz kod, aby go odpakować</p>
  <input class="pin-input" id="pin" type="password" autocomplete="off" autofocus>
  <button class="pin-btn" id="pin-btn" onclick="checkPin()">Dalej</button>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-attempts" id="pin-attempts"></div>
</div>

<div class="screen" id="screen-gift">
  <p class="gift-prompt">Kliknij, aby odpakować</p>
  <div class="gift-box" id="gift-box" onclick="unwrapGift()">
    <div class="bow"><div class="bow-center"></div></div>
    <div class="box-lid"><div class="lid-ribbon"></div></div>
    <div class="box-body">
      <div class="ribbon-h"></div>
      <div class="ribbon-v"></div>
    </div>
  </div>
</div>

<div class="screen" id="screen-reveal">
  <div class="reveal-amount">300 zł</div>
  <div class="reveal-store">do wydania w Douglas</div>
  <div class="reveal-msg">Z okazji Dnia Matki od Igora Michała i Kacpra!</div>
  <button class="dl-btn" onclick="downloadBon()">Pobierz bon</button>
  <div class="heart">&hearts;</div>
</div>

var SALT="W2GXlzdkWYS8uhch0N6P/w==";
var IV="A01fUHr86LxcpN90";
var decryptedBlob=null;
var attempts=0;
var lockUntil=0;

function b64ToBuf(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a.buffer}

/* sparkles */
(function(){
  var c=document.getElementById("sparkles");
  for(var i=0;i<40;i++){
    var d=document.createElement("div");
    d.className="sparkle-dot";
    d.style.left=Math.random()*100+"%";
    d.style.top=Math.random()*100+"%";
    d.style.setProperty("--dur",(2+Math.random()*4)+"s");
    d.style.setProperty("--delay",(Math.random()*5)+"s");
    c.appendChild(d);
  }
})();

function goTo(id){
  var all=document.querySelectorAll(".screen");
  for(var i=0;i<all.length;i++)all[i].classList.remove("active");
  setTimeout(function(){document.getElementById(id).classList.add("active")},50);
}

document.getElementById("pin").addEventListener("keydown",function(e){
  if(e.key==="Enter")checkPin();
});

async function checkPin(){
  var now=Date.now();
  if(now<lockUntil){
    var s=Math.ceil((lockUntil-now)/1000);
    document.getElementById("pin-error").textContent="Odczekaj "+s+"s przed kolejną próbą";
    return;
  }
  var pin=document.getElementById("pin").value;
  if(!pin){document.getElementById("pin-error").textContent="Wpisz kod";return;}
  document.getElementById("pin-btn").textContent="Sprawdzam...";
  document.getElementById("pin-btn").disabled=true;
  try{
    var saltBuf=b64ToBuf(SALT);
    var ivBuf=b64ToBuf(IV);
    var encBuf=b64ToBuf(ENC);
    var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pin),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:new Uint8Array(saltBuf),iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    var dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(ivBuf)},key,encBuf);
    decryptedBlob=new Blob([dec],{type:"application/pdf"});
    goTo("screen-gift");
  }catch(e){
    attempts++;
    var inp=document.getElementById("pin");
    inp.classList.add("wrong");
    setTimeout(function(){inp.classList.remove("wrong")},600);
    document.getElementById("pin-error").textContent="Nieprawidłowy kod";
    if(attempts>=3){
      var wait=Math.min(Math.pow(2,attempts-2)*3,60);
      lockUntil=Date.now()+wait*1000;
      document.getElementById("pin-attempts").textContent="Zbyt wiele prób — blokada na "+wait+"s";
      setTimeout(function(){document.getElementById("pin-attempts").textContent=""},wait*1000);
    }
  }
  document.getElementById("pin-btn").textContent="Dalej";
  document.getElementById("pin-btn").disabled=false;
}

function unwrapGift(){
  var box=document.getElementById("gift-box");
  if(box.classList.contains("opening"))return;
  box.classList.add("opening");
  setTimeout(function(){launchConfetti()},400);
  setTimeout(function(){goTo("screen-reveal")},1200);
}

/* confetti */
function launchConfetti(){
  var cv=document.getElementById("confetti-canvas");
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  var ctx=cv.getContext("2d");
  var colors=["#e8a0bf","#d4a574","#f5d0a9","#fff8f0","#ff6b9d","#c084fc","#7ecba1"];
  var particles=[];
  for(var i=0;i<180;i++){
    particles.push({
      x:cv.width/2+(Math.random()-.5)*100,
      y:cv.height/2,
      vx:(Math.random()-.5)*18,
      vy:(Math.random()-1)*16-4,
      size:3+Math.random()*7,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,
      rv:(Math.random()-.5)*12,
      g:.12+Math.random()*.08,
      o:1,
      shape:Math.random()>.5?1:0
    });
  }
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    var alive=false;
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      if(p.o<=0)continue;
      alive=true;
      p.x+=p.vx;p.vy+=p.g;p.y+=p.vy;
      p.vx*=.99;p.rot+=p.rv;p.o-=.004;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.o);
      ctx.fillStyle=p.color;
      if(p.shape){ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);}
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,6.28);ctx.fill();}
      ctx.restore();
    }
    if(alive)requestAnimationFrame(tick);
  }
  tick();
}

function downloadBon(){
  if(!decryptedBlob)return;
  var u=URL.createObjectURL(decryptedBlob);
  var a=document.createElement("a");
  a.href=u;a.download="bon.pdf";a.click();
  URL.revokeObjectURL(u);
}

window.addEventListener("resize",function(){
  var cv=document.getElementById("confetti-canvas");
  cv.width=window.innerWidth;cv.height=window.innerHeight;
});
